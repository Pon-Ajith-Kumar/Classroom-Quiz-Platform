<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Classroom Quiz - Teacher</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <main class="container">
    <h1>Teacher Control Panel</h1>

    <section class="card controls">
      <div class="status-row">
        <span id="teacherStage" class="badge">Stage 1</span>
        <span id="teacherProgress">Q1 / 10</span>
      </div>
      <div class="button-row">
        <button id="startQuestionBtn">Start Question</button>
        <button id="endQuestionBtn">End Question</button>
        <button id="nextQuestionBtn">Next Question</button>
        <button id="nextStageBtn">Move to Next Stage</button>
        <button id="resetAttemptsBtn">Reset Attempts</button>
      </div>
      <div class="button-row">
        <button class="correct-btn" data-correct="A">Correct: A</button>
        <button class="correct-btn" data-correct="B">Correct: B</button>
        <button class="correct-btn" data-correct="C">Correct: C</button>
        <button class="correct-btn" data-correct="D">Correct: D</button>
      </div>
      <p id="questionLabel">Current Question: Waiting...</p>
      <p id="teacherTimer" class="timer">--</p>
      <p id="teacherError" class="error"></p>
    </section>

    <section class="card">
      <h2>Team Answers (Current Question)</h2>
      <table>
        <thead>
          <tr><th>Team</th><th>Answer</th><th>Attempt</th><th>Timestamp</th><th>Correct</th></tr>
        </thead>
        <tbody id="answersBody"></tbody>
      </table>
    </section>

    <section class="card">
      <h2>Leaderboard</h2>
      <table>
        <thead>
          <tr><th>Rank</th><th>Team</th><th>Score</th><th>Status</th></tr>
        </thead>
        <tbody id="teacherLeaderboardBody"></tbody>
      </table>
      <p id="finalistsText"></p>
      <p id="winnerText"></p>
    </section>
  </main>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/teacher.js"></script>
</body>
</html>
