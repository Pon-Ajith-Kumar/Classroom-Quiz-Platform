<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz Master - Teacher</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <main class="container">
    <h1>🎯 Quiz Control Panel</h1>

    <section class="card controls">
      <div class="status-row">
        <span id="teacherStage" class="badge">Stage 1</span>
        <span id="teacherProgress">Q1 / 10</span>
      </div>
      <div class="button-row">
        <button id="startQuestionBtn">▶ Start Question</button>
        <button id="nextQuestionBtn">⏭ Next Question</button>
        <button id="nextStageBtn">🎭 Next Round</button>
      </div>
      <p id="questionLabel">Current Question: Waiting...</p>
      <p id="teacherTimer" class="timer">--</p>
      <p id="teacherError" class="error"></p>
    </section>

    <section class="card">
      <h2>📊 Live Leaderboard</h2>
      <div class="leaderboard-container" id="teacherLeaderboard"></div>
      <p id="finalistsText" class="info-text"></p>
      <p id="winnerText" class="info-text"></p>
    </section>

    <section class="card">
      <h2>👥 Team Answers (Current Question)</h2>
      <table>
        <thead>
          <tr><th>Team</th><th>Answer</th><th>Attempt</th><th>Timestamp</th><th>Correct</th></tr>
        </thead>
        <tbody id="answersBody"></tbody>
      </table>
    </section>
  </main>

  <!-- Answer Popup Modal -->
  <div class="modal-overlay" id="answerModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 class="modal-title">Correct Answer</h3>
      </div>
      <div class="modal-body">
        <div class="answer-display">
          <div class="answer-label">Correct Answer</div>
          <div class="answer-letter" id="correctAnswerLetter">A</div>
          <div class="answer-text" id="correctAnswerText">Option Text</div>
        </div>
        <div class="explanation" id="answerExplanation">
          Explanation will appear here
        </div>
      </div>
      <div class="modal-footer">
        <button class="close-btn" id="closeAnswerModal">Close</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="announcementModal">
    <div class="modal-content announcement-modal" id="announcementCard">
      <div class="modal-header">
        <div class="announcement-emoji" id="announcementEmoji">🏆</div>
        <h3 class="modal-title" id="announcementTitle">Winner Update</h3>
      </div>
      <div class="modal-body">
        <div class="announcement-winner" id="announcementWinner"></div>
        <div class="explanation announcement-message" id="announcementMessage">Announcement message</div>
      </div>
      <div class="modal-footer">
        <button class="close-btn" id="closeAnnouncementModal">Close</button>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/teacher.js"></script>
</body>
</html>
